<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="100%" height="100%">
  <defs>
    <!-- Tạo dải màu gradient xanh dương -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#1E3A8A" />
    </linearGradient>
  </defs>
  
  <!-- Biểu tượng túi mua hàng (Shopping Bag) -->
  <rect x="20" y="20" width="60" height="60" rx="16" fill="url(#blueGrad)" />
  <path d="M35 40 Q50 15 65 40" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />
  <circle cx="50" cy="55" r="6" fill="#ffffff" />
  
  <!-- Chữ ShopPro -->
  <text x="100" y="68" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="52" font-weight="900" letter-spacing="-1">
    <tspan fill="#111827">Shop</tspan><tspan fill="#2563EB">Pro</tspan>
  </text>
</svg>
